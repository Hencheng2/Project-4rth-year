<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>User Management - SalesForecast AI</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
:root{--primary:#667eea;--secondary:#764ba2;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--dark:#1f2937;--light:#f9fafb;--gray:#6b7280}
body{background:#f5f7fa;color:var(--dark)}
.sidebar{position:fixed;left:0;top:0;height:100vh;width:250px;background:white;box-shadow:2px 0 8px rgba(0,0,0,.08);display:flex;flex-direction:column;z-index:1000}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid #e5e7eb}
.logo{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.nav-links{padding:12px 0;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;padding:11px 20px;color:var(--gray);text-decoration:none;transition:all .2s;font-size:14px;font-weight:500}
.nav-item:hover,.nav-item.active{background:linear-gradient(90deg,rgba(102,126,234,.1),rgba(118,75,162,.1));color:var(--primary);border-right:3px solid var(--primary)}
.nav-item i{margin-right:11px;width:18px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid #e5e7eb}
.user-badge{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:var(--dark)}
.role-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase}
.role-admin{background:rgba(239,68,68,.15);color:#dc2626}
.role-user{background:rgba(102,126,234,.15);color:var(--primary)}
.logout-link{display:block;text-align:center;padding:9px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px}
.main-content{margin-left:250px;padding:24px;min-height:100vh}
.top-bar{background:white;border-radius:12px;padding:15px 22px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.top-bar h2{font-size:19px;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 17px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(102,126,234,.35)}
.btn-success{background:linear-gradient(135deg,#10b981,#34d399)}
.btn-warning{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.btn-danger{background:linear-gradient(135deg,#ef4444,#f87171)}
.btn-outline{background:white;color:var(--primary);border:2px solid var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center;margin-bottom:8px}
.card{background:white;border-radius:12px;padding:22px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-title{font-size:16px;font-weight:700}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:13px}
.form-control{width:100%;padding:9px 13px;border:2px solid #e5e7eb;border-radius:8px;font-size:13px;background:white;transition:border-color .2s}
.form-control:focus{outline:none;border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:22px}
.stat-card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:16px;transition:transform .2s}
.stat-card:hover{transform:translateY(-3px)}
.stat-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.si-blue{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.si-green{background:linear-gradient(135deg,#10b981,#34d399);color:white}
.si-orange{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:white}
.si-purple{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:white}
.si-red{background:linear-gradient(135deg,#ef4444,#f87171);color:white}
.stat-label{font-size:12px;color:var(--gray);font-weight:500}
.stat-value{font-size:24px;font-weight:800;line-height:1.1}
.stat-sub{font-size:11px;font-weight:600;margin-top:3px}
.positive{color:var(--success)}.negative{color:var(--danger)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#f8f9fa;padding:10px 13px;text-align:left;font-weight:700;color:var(--gray);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e5e7eb}
td{padding:11px 13px;border-bottom:1px solid #f3f4f6;font-size:13px;color:var(--dark)}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-success{background:rgba(16,185,129,.15);color:#059669}
.badge-warning{background:rgba(245,158,11,.15);color:#d97706}
.badge-danger{background:rgba(239,68,68,.15);color:#dc2626}
.badge-info{background:rgba(102,126,234,.15);color:var(--primary)}
.msg-box{padding:13px 16px;border-radius:8px;margin-bottom:14px;display:none;font-size:13px}
.msg-success{background:#d1fae5;color:#065f46;border-left:4px solid #10b981}
.msg-error{background:#fee2e2;color:#991b1b;border-left:4px solid #ef4444}
.msg-warning{background:#fffbeb;color:#92400e;border-left:4px solid #f59e0b}
.spinner{width:36px;height:36px;border:4px solid #e5e7eb;border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box{text-align:center;padding:40px;color:var(--gray)}
.empty-state{text-align:center;padding:50px 20px;color:var(--gray)}
.empty-state i{font-size:44px;margin-bottom:14px;display:block;opacity:.3}
.admin-gate{display:none!important}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.main-content{margin-left:0}}

.user-table-wrap{overflow-x:auto}
.role-select{padding:5px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:13px}

</style>
</head>
<body>
<div class="sidebar"><div class="sidebar-header"><div class="logo">SalesForecast AI</div><div class="logo-sub">LSTM · Deep Learning</div></div>
  <div class="nav-links"><a href="/dashboard" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
<a href="/data-management" class="nav-item"><i class="fas fa-database"></i><span>Data Management</span></a>
<a href="/forecast" class="nav-item"><i class="fas fa-bullseye"></i><span>Generate Forecast</span></a>
<a href="/trends-analysis" class="nav-item"><i class="fas fa-chart-bar"></i><span>Trends Analysis</span></a>
<a href="/reports" class="nav-item"><i class="fas fa-file-export"></i><span>Reports</span></a>
<a href="/anomalies" class="nav-item"><i class="fas fa-exclamation-triangle"></i><span>Anomalies</span></a>
<a href="/what-if" class="nav-item"><i class="fas fa-sliders-h"></i><span>What-If Analysis</span></a>
<a href="/model-training" class="nav-item admin-gate"><i class="fas fa-brain"></i><span>Model Training</span></a>
<a href="/admin/users" class="nav-item admin-gate"><i class="fas fa-users-cog"></i><span>User Management</span></a>
</div>
  <div class="sidebar-footer"><div class="user-badge"><div class="user-avatar" id="nav-avatar">?</div>
      <div><div class="user-name" id="nav-username">...</div><div style="margin-top:2px"><span class="role-badge" id="nav-role-badge">...</span></div></div></div>
    <a href="/logout" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
<div class="main-content">

  <div class="top-bar">
    <h2><i class="fas fa-users-cog" style="color:var(--primary);margin-right:10px"></i>User Management</h2>
    <span class="badge badge-danger">Admin Only</span>
  </div>
  <div id="msg-success" class="msg-box msg-success"></div>
  <div id="msg-error" class="msg-box msg-error"></div>

  <div id="access-denied" style="display:none" class="card">
    <div class="empty-state"><i class="fas fa-lock"></i><h3>Admin Access Required</h3><a href="/dashboard" class="btn" style="margin-top:16px">Back to Dashboard</a></div>
  </div>

  <div id="admin-panel" style="display:none">
    <div class="card">
      <div class="card-header"><span class="card-title">All Users</span><button class="btn btn-sm btn-outline" onclick="loadUsers()"><i class="fas fa-sync"></i>Refresh</button></div>
      <div id="users-table"><div class="loading-box"><div class="spinner"></div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Activity Summary</span></div>
      <div id="activity-stats" class="stats-grid" style="grid-template-columns:repeat(3,1fr);gap:12px"></div>
    </div>
  </div>
</div>
<script>(async function(){try{const r=await fetch("/api/user-info");const u=await r.json();const name=u.username||"User";const role=u.role||"user";document.getElementById("nav-avatar").textContent=name[0].toUpperCase();document.getElementById("nav-username").textContent=name;const rb=document.getElementById("nav-role-badge");rb.textContent=role;rb.className="role-badge role-"+role;if(role==="admin"){document.querySelectorAll(".admin-gate").forEach(function(el){el.style.setProperty("display","flex","important");});}window._userRole=role;window._userName=name;document.dispatchEvent(new CustomEvent("userLoaded",{detail:{role:role,name:name}}));}catch(e){console.error("nav",e);}})();</script>
<script>

document.addEventListener("userLoaded",function(e){
  if(e.detail.role==="admin"){
    document.getElementById("admin-panel").style.display="block";
    loadUsers();loadActivityStats();
  } else {
    document.getElementById("access-denied").style.display="block";
  }
});
document.addEventListener("DOMContentLoaded",function(){
  setTimeout(function(){
    if(window._userRole&&document.getElementById("admin-panel").style.display==="none"&&document.getElementById("access-denied").style.display==="none"){
      if(window._userRole==="admin"){document.getElementById("admin-panel").style.display="block";loadUsers();loadActivityStats();}
      else document.getElementById("access-denied").style.display="block";
    }
  },800);
});

async function loadUsers(){
  try{
    const r=await fetch("/api/users");const d=await r.json();
    if(!d.success){showMsg("error",d.message);return;}
    const users=d.users||[];
    const el=document.getElementById("users-table");
    if(!users.length){el.innerHTML='<div class="empty-state"><i class="fas fa-users"></i><p>No users found</p></div>';return;}
    let html='<div class="user-table-wrap"><table><thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead><tbody>';
    users.forEach(function(u){
      html+="<tr><td><strong>"+u.username+"</strong></td><td>"+u.email+"</td>"+
        "<td><select class='role-select' onchange='updateRole("+u.id+",this.value)'>"+
        ["admin","user"].map(function(r){return '<option value="'+r+'"'+(u.role===r?" selected":"")+'>'+r+'</option>';}).join("")+
        "</select></td>"+
        "<td style='font-size:12px;color:var(--gray)'>"+(u.created_at||"").substring(0,10)+"</td>"+
        "<td><button class='btn btn-sm btn-danger' onclick='deleteUser("+u.id+",\""+u.username+"\")'><i class='fas fa-trash'></i></button></td></tr>";
    });
    html+="</tbody></table></div>";
    el.innerHTML=html;
  }catch(e){showMsg("error","Error: "+e.message);}
}

async function updateRole(id,role){
  try{
    const r=await fetch("/api/update-user-role",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:id,role:role})});
    const d=await r.json();
    if(d.success)showMsg("success","Role updated to "+role);
    else showMsg("error",d.message);
  }catch(e){showMsg("error","Error: "+e.message);}
}

async function deleteUser(id,name){
  if(!confirm("Delete user '"+name+"'? This cannot be undone."))return;
  try{
    const r=await fetch("/api/delete-user/"+id,{method:"DELETE"});
    const d=await r.json();
    if(d.success){showMsg("success","User deleted.");loadUsers();}
    else showMsg("error",d.message);
  }catch(e){showMsg("error","Error: "+e.message);}
}

async function loadActivityStats(){
  try{
    const d=await fetch("/api/dashboard-stats").then(r=>r.json());
    const s=d.stats||{};
    document.getElementById("activity-stats").innerHTML=
      miniStat("Total Predictions",s.total_predictions||0,"si-purple")+
      miniStat("Total Sales Records","$"+(s.total_sales||0).toLocaleString("en-US",{maximumFractionDigits:0}),"si-blue")+
      miniStat("Units Tracked",(s.total_units||0).toLocaleString(),"si-orange");
  }catch(e){}
}

function miniStat(label,val,ic){return '<div class="stat-card"><div class="stat-icon '+ic+'"></div><div><div class="stat-label">'+label+'</div><div class="stat-value" style="font-size:18px">'+val+'</div></div></div>';}
function showMsg(type,msg){const el=document.getElementById("msg-"+type);if(!el)return;el.textContent=msg;el.style.display="block";setTimeout(function(){el.style.display="none";},6000);}

</script>
</body>
</html>
